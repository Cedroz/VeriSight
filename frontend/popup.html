<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VeriSight</title>
    <style>
        body {
            width: 350px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
        }
        .status.safe {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.warning {
            background: #fff3e0;
            color: #e65100;
        }
        .status.danger {
            background: #ffebee;
            color: #c62828;
        }
        .info {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #1976d2;
            color: white;
        }
        .btn-primary:hover {
            background: #1565c0;
        }
        .btn-warning {
            background: #ff9800;
            color: white;
        }
        .btn-warning:hover {
            background: #f57c00;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>VeriSight</h1>
        <p style="font-size: 12px; color: #666;">Protecting you from fake websites</p>
    </div>
    
    <div id="status" class="status">
        <p>Checking current page...</p>
    </div>
    
    <div class="info">
        <p><strong>How it works:</strong></p>
        <ul style="font-size: 12px; line-height: 1.6;">
            <li>Analyzes domain age via WHOIS</li>
            <li>Compares visual elements (logos)</li>
            <li>Detects typosquatting patterns</li>
            <li>Blocks inputs on suspicious sites</li>
        </ul>
    </div>
    
    <button class="btn-primary" id="checkNow">Check Current Page</button>
    <button class="btn-warning" id="unblockInputs" style="display: none; margin-top: 10px; background: #ff9800;">Unblock Inputs (Emergency Override)</button>
    
    <script src="popup.js"></script>
</body>
</html>
